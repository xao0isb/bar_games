<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flappy Bird — Экран</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="host">
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="qr-panel">
      <div class="qr-card">
        <h1>🐦 Flappy Bird</h1>
        <p>Отсканируйте QR-код телефоном,<br>чтобы стать игроком</p>
        <div class="qr">{{ qr_svg | safe }}</div>
        <p class="url"><a href="{{ controller_url }}">{{ controller_url }}</a></p>
      </div>
    </div>

    <div id="overlay"></div>
  </div>

  <script>const SESSION_ID = "{{ session_id }}";</script>
  <script src="/static/host.js"></script>
</body>
</html>
