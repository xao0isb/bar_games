# Nginx reverse proxy for the bare-metal (systemd) deployment.
# Place in /etc/nginx/sites-available/flappy and symlink into sites-enabled.
#
# For HTTPS, run:  sudo certbot --nginx -d game.example.com
# (certbot rewrites this server block to add the TLS listener + certificate).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name game.example.com;   # <-- change to your domain (or _ for any)

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (the phone <-> screen channel).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;   # keep long-lived game sockets open
    }
}
